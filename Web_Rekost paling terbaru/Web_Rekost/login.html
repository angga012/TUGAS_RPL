<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - RE-KOST</title>
    <meta name="description" content="Masuk ke akun RE-KOST untuk mencari kos, barang bekas, dan jasa angkut berkualitas.">
    <!-- Link CSS Global & CSS khusus Auth -->
    <link rel="stylesheet" href="Css/main.css">
    <link rel="stylesheet" href="Css/auth.css">
</head>
<body>

    <!-- Background Blurry Pastel Blobs -->
    <div class="background-blobs" aria-hidden="true">
        <div class="blob blob-teal"></div>
        <div class="blob blob-orange"></div>
    </div>

    <!-- Main Wrapper -->
    <div class="auth-wrapper">
        
        <!-- Split-screen Card -->
        <main class="auth-card">
            
            <!-- Area Sisi Kiri (Banner Hijau Tua) -->
            <section class="auth-banner" aria-label="Selamat Datang Kembali">
                <div class="banner-logo-circle">
                    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Logo RE-KOST">
                        <path d="M22 23 C22 13, 42 13, 42 23" stroke="#10B981" stroke-width="4.5" stroke-linecap="round" fill="none"/>
                        <path d="M32 13 C35 13, 38 10, 37 7 C36 4, 33 6, 32 13 Z" fill="#10B981" />
                        <path d="M14 36 L32 20 L50 36 V54 C50 56.2 48.2 58 46 58 H18 C15.8 58 14 56.2 14 54 V36 Z" fill="#FF7A30"/>
                        <path d="M27 58 V44 C27 42.9 27.9 42 29 42 H35 C36.1 42 37 42.9 37 44 V58 H27 Z" fill="#FFFFFF"/>
                        <circle cx="32" cy="31" r="3.5" fill="#FFFFFF" />
                    </svg>
                </div>
                <h2 class="banner-logo-title">RE-KOST</h2>
                <p class="banner-logo-subtitle">PASAR ANAK KOS</p>
                <p class="banner-logo-tagline">Temukan kebutuhan kos harian Anda dengan cepat, aman, dan terpercaya dari sesama rekan mahasiswa kampus Anda.</p>
                <p class="banner-welcome-text">Selamat Datang Kembali!</p>
            </section>
            
            <!-- Area Sisi Kanan (Form Login Putih Bersih) -->
            <section class="auth-form-container" aria-label="Form Masuk">
                
                <div class="auth-form-header">
                    <h1 class="auth-form-title">Masuk ke Akun</h1>
                </div>

                <form id="loginForm" class="auth-form" onsubmit="loginUser(event)">
                    
                    <!-- Input: Nomor HP atau Email -->
                    <div class="form-group">
                        <label for="username" class="form-label">Nomor HP / WhatsApp</label>
                        <div class="input-container">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                            </svg>
                            <input type="tel" id="username" name="username" class="form-input" placeholder="Masukkan nomor HP terdaftar" required autocomplete="tel">
                        </div>
                    </div>

                    <!-- Input: Password -->
                    <div class="form-group">
                        <label for="password" class="form-label">Kata Sandi</label>
                        <div class="input-container">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" id="password" name="password" class="form-input" placeholder="Masukkan kata sandi Anda" required autocomplete="current-password">
                        </div>
                    </div>

                    <!-- Button: Masuk -->
                    <button type="submit" class="btn-blue" style="background-color: var(--color-primary); color: white;">Masuk</button>
                    
                </form>

                <!-- Link alternatif ke register & admin login -->
                <p class="auth-alt-link" style="margin-top: 1.25rem;">
                    Belum punya akun? <a href="register.html">Daftar disini</a>
                </p>
                
                <p class="auth-alt-link" style="margin-top: 0.5rem; font-size: 0.8rem; opacity: 0.85;">
                    <a href="admin-login.html" style="color: #6366f1; font-weight: 600;">Login sebagai Administrator</a>
                </p>

            </section>
            
        </main>
        
    </div>

    <script>
        function loginUser(event) {
            event.preventDefault();
            const phone = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // Get users from localStorage
            let users = JSON.parse(localStorage.getItem('re_kost_users')) || [];

            // Find user
            const user = users.find(u => u.phone === phone);

            if (!user) {
                alert("Nomor HP/WhatsApp belum terdaftar. Silakan daftar terlebih dahulu.");
                return;
            }

            if (user.password !== password) {
                alert("Kata sandi yang Anda masukkan salah.");
                return;
            }

            if (user.status === 'ditangguhkan') {
                alert("Akun Anda ditangguhkan oleh Administrator. Silakan hubungi pusat bantuan.");
                return;
            }

            // Mock login successful
            localStorage.setItem('user_logged_in', 'true');
            localStorage.setItem('current_user', JSON.stringify(user));

            alert("Selamat datang kembali, " + user.name + "!");
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
