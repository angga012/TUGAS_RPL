<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - RE-KOST</title>
    <meta name="description" content="Buat akun RE-KOST untuk mulai mencari barang bekas berkualitas, jasa angkut, dan kebutuhan harian anak kos.">
    <!-- Link CSS Global & CSS khusus Auth -->
    <link rel="stylesheet" href="Css/main.css">
    <link rel="stylesheet" href="Css/auth.css">
</head>
<body>

    <!-- Background Blurry Pastel Blobs (Consistent with Welcome page) -->
    <div class="background-blobs" aria-hidden="true">
        <div class="blob blob-teal"></div>
        <div class="blob blob-orange"></div>
    </div>

    <!-- Main Wrapper for Alignment -->
    <div class="auth-wrapper">
        
        <!-- Split-screen Card -->
        <main class="auth-card">
            
            <!-- 1. Area Sisi Kiri (Banner Hijau Tua) -->
            <section class="auth-banner" aria-label="Selamat Datang">
                <!-- White Circle for Logo -->
                <div class="banner-logo-circle">
                    <!-- RE-KOST Custom SVG Logo (Orange House with Green Leaf/Shopping Handle) -->
                    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Logo RE-KOST">
                        <!-- Green Handle / Leaf Loop -->
                        <path d="M22 23 C22 13, 42 13, 42 23" stroke="#10B981" stroke-width="4.5" stroke-linecap="round" fill="none"/>
                        <!-- Leaf small detailing -->
                        <path d="M32 13 C35 13, 38 10, 37 7 C36 4, 33 6, 32 13 Z" fill="#10B981" />
                        <!-- Orange House Base -->
                        <path d="M14 36 L32 20 L50 36 V54 C50 56.2 48.2 58 46 58 H18 C15.8 58 14 56.2 14 54 V36 Z" fill="#FF7A30"/>
                        <!-- House Door (White Cutout) -->
                        <path d="M27 58 V44 C27 42.9 27.9 42 29 42 H35 C36.1 42 37 42.9 37 44 V58 H27 Z" fill="#FFFFFF"/>
                        <!-- House Window (White Cutout) -->
                        <circle cx="32" cy="31" r="3.5" fill="#FFFFFF" />
                    </svg>
                </div>
                <!-- Brand Title -->
                <h2 class="banner-logo-title">RE-KOST</h2>
                <!-- Brand Subtitle -->
                <p class="banner-logo-subtitle">PASAR ANAK KOS</p>
                <!-- Brand Tagline (Kalimat penjelasan di bawah logo) -->
                <p class="banner-logo-tagline">RE-KOST membantu Anda menemukan perlengkapan kos berkualitas dari sesama mahasiswa dengan harga yang bersahabat dan ramah lingkungan.</p>
                <!-- Welcome text -->
                <p class="banner-welcome-text">Selamat Datang!</p>
            </section>
            
            <!-- 2. Area Sisi Kanan (Form Putih Bersih) -->
            <section class="auth-form-container" aria-label="Form Pendaftaran">
                
                <div class="auth-form-header">
                    <h1 class="auth-form-title">Buat Akun RE-KOST</h1>
                </div>

                <form id="registerForm" class="auth-form" onsubmit="registerUser(event)">
                    
                    <!-- Input 1: Nama -->
                    <div class="form-group">
                        <label for="nama" class="form-label">Nama</label>
                        <div class="input-container">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <input type="text" id="nama" name="nama" class="form-input" placeholder="Masukkan nama lengkap Anda" required autocomplete="name">
                        </div>
                    </div>

                    <!-- Input 2: Nomor HP/WhatsApp -->
                    <div class="form-group">
                        <label for="nomor" class="form-label">Nomor (HP/WhatsApp)</label>
                        <div class="input-container">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                            </svg>
                            <input type="tel" id="nomor" name="nomor" class="form-input" placeholder="Contoh: 081234567890" required autocomplete="tel">
                        </div>
                    </div>

                    <!-- Input 3: Nama Kampus -->
                    <div class="form-group">
                        <label for="kampus" class="form-label">Nama Kampus</label>
                        <div class="input-container">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                                <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path>
                            </svg>
                            <input type="text" id="kampus" name="kampus" class="form-input" placeholder="Contoh: Universitas Indonesia" required>
                        </div>
                    </div>

                    <!-- Input 4: Lokasi Kost -->
                    <div class="form-group">
                        <label for="lokasi" class="form-label">Lokasi Kost</label>
                        <div class="input-container">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                            <input type="text" id="lokasi" name="lokasi" class="form-input" placeholder="Contoh: Depok, Margonda" required>
                        </div>
                    </div>

                    <!-- Input 5: Password -->
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-container">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" id="password" name="password" class="form-input" placeholder="Buat kata sandi minimal 8 karakter" required autocomplete="new-password">
                        </div>
                    </div>

                    <!-- Button: Daftar Akun (Biru Cerah) -->
                    <button type="submit" class="btn-blue">Daftar Akun</button>
                    
                </form>

                <!-- Link alternatif ke login -->
                <p class="auth-alt-link">
                    Sudah punya akun? <a href="login.html">Masuk disini</a>
                </p>

            </section>
            
        </main>
        
    </div>

    <script>
        function registerUser(event) {
            event.preventDefault();
            const name = document.getElementById('nama').value.trim();
            const phone = document.getElementById('nomor').value.trim();
            const campus = document.getElementById('kampus').value.trim();
            const location = document.getElementById('lokasi').value.trim();
            const password = document.getElementById('password').value;

            // Get existing users
            let users = JSON.parse(localStorage.getItem('re_kost_users')) || [];
            
            // Check if phone already registered
            if (users.some(u => u.phone === phone)) {
                alert("Nomor HP/WhatsApp ini sudah terdaftar. Silakan gunakan nomor lain atau masuk.");
                return;
            }

            // Create new user object
            const newUser = {
                name: name,
                phone: phone,
                campus: campus,
                location: location,
                password: password,
                role: 'pembeli', // default role
                status: 'aktif', // default status
                registeredAt: new Date().toLocaleDateString('id-ID')
            };

            users.push(newUser);
            localStorage.setItem('re_kost_users', JSON.stringify(users));

            alert("Pendaftaran akun RE-KOST berhasil! Silakan masuk.");
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
