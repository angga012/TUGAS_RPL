<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Iklan - RE-KOST Admin</title>
    <!-- Link Google Fonts & CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Css/main.css">
    <link rel="stylesheet" href="../Css/Admin/admin-dashboard.css">
    <style>
        .grid-listings {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .listing-card {
            background-color: var(--admin-db-card);
            border: 1px solid var(--admin-db-border);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
        }
        .listing-card:hover {
            transform: translateY(-4px);
            border-color: var(--admin-db-primary);
        }
        .listing-img-box {
            position: relative;
            height: 180px;
            background-color: #1e293b;
        }
        .listing-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .listing-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(245, 158, 11, 0.9);
            color: #ffffff;
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
        }
        .listing-badge.aktif {
            background-color: rgba(16, 185, 129, 0.9);
        }
        .listing-badge.ditolak {
            background-color: rgba(239, 68, 68, 0.9);
        }
        .listing-body {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }
        .listing-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--admin-db-text-primary);
        }
        .listing-seller {
            font-size: 0.8rem;
            color: var(--admin-db-text-muted);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .listing-price {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--admin-db-primary);
            margin-top: 0.25rem;
        }
        .listing-facility {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .fac-badge {
            background-color: rgba(255,255,255,0.04);
            border: 1px solid var(--admin-db-border);
            font-size: 0.7rem;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            color: var(--admin-db-text-muted);
        }
        .listing-actions {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--admin-db-border);
            display: flex;
            gap: 0.75rem;
            background-color: rgba(0,0,0,0.1);
        }
        .btn-card-verify {
            flex: 1.5;
            padding: 0.55rem;
            background-color: var(--admin-db-success);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: filter 0.2s;
        }
        .btn-card-reject {
            flex: 1;
            padding: 0.55rem;
            background-color: rgba(239, 68, 68, 0.15);
            color: var(--admin-db-danger);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-card-verify:hover { filter: brightness(1.15); }
        .btn-card-reject:hover { background-color: var(--admin-db-danger); color: #ffffff; }
    </style>
</head>
<body>

    <!-- Access Validation Script -->
    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = '../admin-login.html';
        }
    </script>

    <!-- Background Blurry Pastel Blobs (Consistent with User/Seller) -->
    <div class="background-blobs" aria-hidden="true">
        <div class="blob blob-teal"></div>
        <div class="blob blob-orange"></div>
    </div>

    <div class="db-container">
        
        <!-- Sidebar Navigation -->
        <aside class="db-sidebar" id="sidebar">
            <div class="db-logo-section">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 23 C22 13, 42 13, 42 23" stroke="#3b82f6" stroke-width="4.5" stroke-linecap="round" fill="none"/>
                    <path d="M32 13 C35 13, 38 10, 37 7 C36 4, 33 6, 32 13 Z" fill="#3b82f6" />
                    <path d="M14 36 L32 20 L50 36 V54 C50 56.2 48.2 58 46 58 H18 C15.8 58 14 56.2 14 54 V36 Z" fill="#6366f1" />
                    <path d="M27 58 V44 C27 42.9 27.9 42 29 42 H35 C36.1 42 37 42.9 37 44 V58 H27 Z" fill="#0e131f" />
                    <circle cx="32" cy="31" r="3.5" fill="#3b82f6" />
                </svg>
                <div>
                    <h1 class="db-logo-title">RE-KOST</h1>
                    <span class="db-logo-subtitle">ADMIN CONSOLE</span>
                </div>
            </div>

            <nav style="flex: 1; display: flex; flex-direction: column;">
                <ul class="db-nav-menu">
                    <!-- Dashboard -->
                    <li class="db-nav-item">
                        <a href="dashboard.html">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="7" height="9"></rect>
                                <rect x="14" y="3" width="7" height="5"></rect>
                                <rect x="14" y="12" width="7" height="9"></rect>
                                <rect x="3" y="16" width="7" height="5"></rect>
                            </svg>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <!-- Kelola User -->
                    <li class="db-nav-item">
                        <a href="users.html">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                            <span>Kelola User</span>
                        </a>
                    </li>
                    <!-- Kelola Produk Active -->
                    <li class="db-nav-item active">
                        <a href="products.html">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                            <span>Kelola Produk</span>
                        </a>
                    </li>
                    <!-- Kelola Laporan -->
                    <li class="db-nav-item">
                        <a href="reports.html">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="20" x2="18" y2="10"></line>
                                <line x1="12" y1="20" x2="12" y2="4"></line>
                                <line x1="6" y1="20" x2="6" y2="14"></line>
                            </svg>
                            <span>Kelola Laporan</span>
                        </a>
                    </li>
                    <!-- Kelola Transaksi -->
                    <li class="db-nav-item">
                        <a href="transactions.html">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="1" x2="12" y2="23"></line>
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                            </svg>
                            <span>Kelola Transaksi</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="db-sidebar-footer">
                <button class="btn-logout" onclick="logoutAdmin()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Logout Admin
                </button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="db-main">
            <!-- Header Navbar -->
            <header class="db-header">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button class="db-hamburger" onclick="toggleSidebar()" aria-label="Buka Menu">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <h2 class="db-header-title">Verifikasi Iklan Kos</h2>
                </div>

                <div class="db-header-right">
                    <a href="notifications.html" class="db-bell-btn" aria-label="Notifikasi">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                        <span class="db-bell-badge"></span>
                    </a>

                    <div class="db-admin-profile">
                        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop" alt="Avatar Admin" class="db-admin-avatar">
                        <div class="db-admin-info">
                            <span class="db-admin-name" id="adminName">Super Admin</span>
                            <span class="db-admin-role">System Root</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Scrollable Content -->
            <div class="db-content">
                
                <!-- Summary / Stats Counter -->
                <section class="db-metrics-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));" aria-label="Statistik Iklan">
                    <div class="metric-card">
                        <div class="metric-icon-box warning">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                        </div>
                        <div class="metric-data">
                            <span class="metric-title">Menunggu Review</span>
                            <span class="metric-value" id="pendingCount">3 Iklan</span>
                        </div>
                    </div>
                    
                    <div class="metric-card">
                        <div class="metric-icon-box green">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                        <div class="metric-data">
                            <span class="metric-title">Disetujui Hari Ini</span>
                            <span class="metric-value">12 Iklan</span>
                        </div>
                    </div>
                </section>

                <!-- Search & Filters -->
                <section class="db-panel db-controls-row" style="margin-bottom: 1.5rem; display: flex; gap: 15px; align-items: center; justify-content: space-between; padding: 1.25rem;">
                    <div style="font-weight: 700; font-size: 1.1rem; color: var(--admin-db-text-primary);">Daftar Semua Listing Iklan</div>
                    <div class="db-filter-group" style="display: flex; gap: 10px;">
                        <select id="statusFilter" class="db-select-filter" onchange="renderListings()" style="background-color: #1e293b; color: white; border: 1px solid var(--admin-db-border); border-radius: 8px; padding: 6px 12px; font-weight: 600; cursor: pointer;">
                            <option value="all">Semua Status</option>
                            <option value="pending">Pending</option>
                            <option value="aktif">Aktif</option>
                            <option value="ditolak">Ditolak</option>
                        </select>
                    </div>
                </section>

                <!-- Grid of Listings to Verify -->
                <section class="grid-listings" id="listingsGrid" aria-label="Pengajuan Listing Kos">
                    <!-- Rendered dynamically by JS -->
                </section>

            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const adminName = localStorage.getItem('admin_name') || 'Super Admin';
            document.getElementById('adminName').textContent = adminName;
            
            renderListings();
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        function logoutAdmin() {
            if(confirm("Apakah Anda yakin ingin keluar dari Admin Control Center?")) {
                localStorage.removeItem('admin_logged_in');
                window.location.href = '../admin-login.html';
            }
        }

        // Render listings dynamically
        function renderListings() {
            const products = JSON.parse(localStorage.getItem('re_kost_products')) || [];
            const grid = document.getElementById('listingsGrid');
            const statusFilter = document.getElementById('statusFilter') ? document.getElementById('statusFilter').value : 'all';
            
            // Filter products based on selected status
            let filteredProducts = products;
            if (statusFilter !== 'all') {
                filteredProducts = products.filter(p => {
                    const stat = p.status || 'aktif';
                    return stat === statusFilter;
                });
            }
            
            // Show stats for pending count
            const pendingCount = products.filter(p => p.status === 'pending').length;
            document.getElementById('pendingCount').textContent = `${pendingCount} Iklan`;
            
            grid.innerHTML = '';
            
            if (filteredProducts.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--admin-db-text-muted);">
                        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:1rem; opacity:0.5; display:inline-block;">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="9" x2="15" y2="15"></line>
                            <line x1="15" y1="9" x2="9" y2="15"></line>
                        </svg>
                        <p style="font-size:1.15rem; font-weight:600; color:var(--admin-db-text-primary);">Tidak ada listing iklan</p>
                        <p style="font-size:0.85rem; margin-top:0.25rem;">Tidak ada barang yang cocok dengan filter terpilih.</p>
                    </div>
                `;
                return;
            }

            filteredProducts.forEach(p => {
                const card = document.createElement('div');
                card.className = 'listing-card';
                card.setAttribute('data-id', p.id);
                
                // Status mapping
                const currentStatus = p.status || 'aktif';
                let badgeClass = '';
                let statusLabel = 'Kost Baru (Pending)';
                if (currentStatus === 'aktif') {
                    badgeClass = 'aktif';
                    statusLabel = 'Aktif';
                } else if (currentStatus === 'ditolak') {
                    badgeClass = 'ditolak';
                    statusLabel = 'Ditolak';
                }

                // Facilities layout
                let facHtml = '';
                if (p.facilities) {
                    p.facilities.forEach(fac => {
                        facHtml += `<span class="fac-badge">${fac}</span>`;
                    });
                }

                // Custom Actions Buttons HTML based on status
                let actionsHtml = '';
                if (currentStatus === 'pending') {
                    actionsHtml = `
                        <button class="btn-card-verify" onclick="verifyListing('${p.id}', '${p.title}')">Verifikasi</button>
                        <button class="btn-card-reject" onclick="rejectListing('${p.id}', '${p.title}')">Tolak</button>
                    `;
                } else if (currentStatus === 'aktif') {
                    actionsHtml = `
                        <button class="btn-card-reject" onclick="rejectListing('${p.id}', '${p.title}')" style="flex: 1.5; background-color: rgba(239, 68, 68, 0.15); color: var(--admin-db-danger);">Tolak / Suspend</button>
                        <button class="btn-card-reject" onclick="deleteListing('${p.id}', '${p.title}')" style="flex: 1; background-color: #ef4444; color: white;">Hapus</button>
                    `;
                } else if (currentStatus === 'ditolak') {
                    actionsHtml = `
                        <button class="btn-card-verify" onclick="verifyListing('${p.id}', '${p.title}')" style="flex: 1.5;">Aktifkan Lagi</button>
                        <button class="btn-card-reject" onclick="deleteListing('${p.id}', '${p.title}')" style="flex: 1; background-color: #ef4444; color: white;">Hapus</button>
                    `;
                }
                
                card.innerHTML = `
                    <div class="listing-img-box">
                        <img src="${p.image}" class="listing-img" alt="Foto Kos" onerror="this.src='https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?w=500&auto=format&fit=crop'">
                        <span class="listing-badge ${badgeClass}">${statusLabel}</span>
                    </div>
                    <div class="listing-body">
                        <span class="listing-title">${p.title}</span>
                        <span class="listing-seller">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            Oleh: ${p.sellerName}
                        </span>
                        <span class="listing-price">Rp${p.price.toLocaleString('id-ID')}</span>
                        <p style="font-size:0.82rem; color:var(--admin-db-text-muted); line-height:1.4; margin-top:0.25rem;">
                            ${p.description || 'Kos mahasiswa dekat dengan kampus penunjang, berfasilitas premium dan lokasi terjangkau.'}
                        </p>
                        <div class="listing-facility">${facHtml}</div>
                    </div>
                    <div class="listing-actions">
                        ${actionsHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
            updateBellBadge();
        }

        function updateBellBadge() {
            const users = JSON.parse(localStorage.getItem('re_kost_users')) || [];
            const products = JSON.parse(localStorage.getItem('re_kost_products')) || [];
            const transactions = JSON.parse(localStorage.getItem('re_kost_transactions')) || [];

            const pendingUsers = users.filter(u => u.status === 'pending').length;
            const pendingProducts = products.filter(p => p.status === 'pending').length;
            const pendingTransactions = transactions.filter(t => t.status === 'pending').length;

            const totalPending = pendingUsers + pendingProducts + pendingTransactions;
            const bellBadge = document.querySelector('.db-bell-badge');
            if (bellBadge) {
                if (totalPending > 0) {
                    bellBadge.textContent = totalPending;
                    bellBadge.style.display = 'flex';
                } else {
                    bellBadge.style.display = 'none';
                }
            }
        }

        function verifyListing(productId, kostName) {
            if(confirm(`Setujui dan tayangkan iklan "${kostName}"?`)) {
                let products = JSON.parse(localStorage.getItem('re_kost_products')) || [];
                products = products.map(p => {
                    if (p.id === productId) {
                        return { ...p, status: 'aktif' };
                    }
                    return p;
                });
                localStorage.setItem('re_kost_products', JSON.stringify(products));
                
                alert(`Iklan "${kostName}" disetujui untuk tayang.`);
                renderListings();
            }
        }

        function rejectListing(productId, kostName) {
            const reason = prompt(`Alasan penolakan untuk "${kostName}":`);
            if (reason !== null) {
                let products = JSON.parse(localStorage.getItem('re_kost_products')) || [];
                products = products.map(p => {
                    if (p.id === productId) {
                        return { ...p, status: 'ditolak', rejectReason: reason };
                    }
                    return p;
                });
                localStorage.setItem('re_kost_products', JSON.stringify(products));
                
                alert(`Iklan "${kostName}" ditolak. Alasan: ${reason || 'Tidak memenuhi kriteria.'}`);
                renderListings();
            }
        }

        function deleteListing(productId, kostName) {
            if (confirm(`Apakah Anda yakin ingin menghapus permanen iklan "${kostName}"? Tindakan ini tidak dapat dibatalkan.`)) {
                let products = JSON.parse(localStorage.getItem('re_kost_products')) || [];
                products = products.filter(p => p.id !== productId);
                localStorage.setItem('re_kost_products', JSON.stringify(products));
                
                alert(`Iklan "${kostName}" berhasil dihapus dari database.`);
                renderListings();
            }
        }
    </script>
</body>
</html>
