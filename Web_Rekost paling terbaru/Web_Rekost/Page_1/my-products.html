<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barang yang Dijual - RE-KOST</title>
    <meta name="description" content="Kelola daftar barang yang kamu jual di RE-KOST.">
    <link rel="stylesheet" href="../Css/main.css">
    <link rel="stylesheet" href="../Css/dashboard.css">
    <link rel="stylesheet" href="../Css/Admin/my-products.css">
</head>
<body data-page="my-products">
    <div class="background-blobs" aria-hidden="true">
        <div class="blob blob-teal"></div>
        <div class="blob blob-orange"></div>
    </div>

    <div class="list-wrapper">
        <header class="list-header">
            <div class="header-title-group">
                <a href="../profile.html" class="btn-back" aria-label="Kembali ke Profil">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
                <div>
                    <h1>Barang yang Dijual</h1>
                    <p>Kelola barang yang sudah kamu unggah.</p>
                </div>
            </div>
            <a href="sell-product.html" class="header-action">Tambah Barang</a>
        </header>

        <main class="list-content">
            <section class="summary-row" aria-label="Ringkasan barang">
                <div class="summary-card">
                    <span class="summary-label">Total Barang</span>
                    <strong id="total-products">0</strong>
                </div>
                <div class="summary-card">
                    <span class="summary-label">Menunggu Review</span>
                    <strong id="pending-products">0</strong>
                </div>
                <div class="summary-card">
                    <span class="summary-label">Aktif</span>
                    <strong id="active-products">0</strong>
                </div>
            </section>

            <section class="toolbar" aria-label="Filter barang">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="search" id="product-search" placeholder="Cari barang saya..." aria-label="Cari barang saya">
                </div>
                <select id="status-filter" aria-label="Filter status">
                    <option value="all">Semua Status</option>
                    <option value="active">Aktif</option>
                    <option value="pending">Menunggu Review</option>
                    <option value="sold">Terjual</option>
                </select>
            </section>

            <section class="products-grid list-grid" id="products-list" aria-live="polite"></section>
            <div class="empty-state" id="empty-state" hidden>
                <h2>Belum ada barang dijual</h2>
                <p>Upload barang kos bekasmu agar pembeli bisa menemukannya.</p>
                <a href="sell-product.html">Upload Barang</a>
            </div>
        </main>

        <nav class="bottom-nav" aria-label="Navigasi Utama">
            <a href="../dashboard.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Home</span>
            </a>
            <a href="../marketplace.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                <span>Category</span>
            </a>
            <a href="sell-product.html" class="nav-item nav-item-sell active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                <span>Sell</span>
            </a>
            <a href="../chat.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span>Chat</span>
            </a>
            <a href="../profile.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span>Profile</span>
            </a>
            <!-- Logout (Hanya muncul di desktop sidebar) -->
            <a href="#" class="nav-item nav-item-logout" onclick="logoutUser(event)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Logout</span>
            </a>
        </nav>
    </div>

    <script src="../Js/Admin/Produk/my-products.js"></script>
    <script>
        function logoutUser(event) {
            if (event) event.preventDefault();
            if (confirm("Apakah Anda yakin ingin keluar dari akun RE-KOST?")) {
                localStorage.removeItem('user_logged_in');
                localStorage.removeItem('current_user');
                window.location.href = '../index.html';
            }
        }
    </script>
</body>
</html>
