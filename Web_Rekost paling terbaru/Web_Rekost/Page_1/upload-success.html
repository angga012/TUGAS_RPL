<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Berhasil - RE-KOST</title>
    <meta name="description" content="Selamat! Barang kos bekas Anda berhasil diupload ke RE-KOST.">
    <!-- Link CSS Global & CSS khusus Product/Upload -->
    <link rel="stylesheet" href="../Css/main.css">
    <link rel="stylesheet" href="../Css/product.css">
</head>
<body class="success-body">

    <!-- Background Blurry Pastel Blobs (Consistent across screens) -->
    <div class="background-blobs" aria-hidden="true">
        <div class="blob blob-teal"></div>
        <div class="blob blob-orange"></div>
    </div>

    <!-- Main Content Wrapper -->
    <div class="success-page-wrapper">
        
        <!-- 1. Success Modal / Card -->
        <main class="success-card">
            
            <!-- Green Circle Check Icon with Glow -->
            <div class="success-icon-glow">
                <div class="success-check-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
            </div>

            <!-- Title & Description -->
            <h1 class="success-title">Barang Berhasil Diupload</h1>
            <p class="success-description">Produk Anda berhasil diunggah dan sedang menunggu peninjauan oleh Administrator. Barang Anda akan terpublikasi setelah disetujui.</p>

            <!-- Buttons Vertical Row -->
            <div class="success-buttons-group">
                <a href="my-products.html" class="btn-success-primary" id="btn-view-my-product">Lihat Barang Saya</a>
                <a href="../dashboard.html" class="btn-success-secondary" id="btn-back-to-home">Kembali ke Home</a>
            </div>

            <!-- Horizontal Divider -->
            <hr class="success-card-divider">

            <!-- Trust Badge Section -->
            <div class="success-trust-section">
                <span class="success-trust-badge">
                    <svg class="trust-badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        <path d="M9 11l2 2 4-4"></path>
                    </svg>
                    <span>Trust Badge Aktif</span>
                </span>
                <p class="success-trust-text">RE-KOST Community Trusted Seller</p>
            </div>

        </main>



    </div>

</body>
</html>
